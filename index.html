<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚠️ ████████ CORRUPTED ████████ ⚠️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -2px); }
            60% { transform: translate(-2px, -2px); }
            80% { transform: translate(2px, 2px); }
            100% { transform: translate(0); }
        }

        body {
            background: #0a0a0a;
            color: #b0b0b0;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            cursor: crosshair;
        }

        /* Mini Data Bar */
        .data-mini {
            position: fixed;
            top: 5px;
            left: 5px;
            background: rgba(0,0,0,0.9);
            border: 1px solid #330000;
            padding: 4px 8px;
            font-size: 0.6rem;
            z-index: 100;
            color: #660000;
            display: flex;
            gap: 10px;
        }

        /* Threat Dot */
        .threat-dot {
            position: fixed;
            top: 5px;
            right: 5px;
            width: 20px;
            height: 20px;
            border: 1px solid #330000;
            z-index: 100;
            background: #111;
        }

        .threat-fill {
            height: 100%;
            width: 0%;
            background: #330000;
            transition: width 0.3s;
        }

        /* Secret Whisper */
        .whisper {
            position: fixed;
            bottom: 5px;
            left: 5px;
            color: #330000;
            font-size: 0.6rem;
            z-index: 100;
            font-style: italic;
            animation: pulse 3s infinite;
        }

        /* Progress */
        .progress {
            position: fixed;
            bottom: 5px;
            right: 5px;
            font-size: 0.6rem;
            color: #330000;
            z-index: 100;
        }

        /* Button Grid - Compact */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
            max-width: 400px;
            margin: 50px auto 15px;
        }

        .chaos-btn {
            background: #111;
            border: 1px solid #330000;
            color: #660000;
            padding: 5px 2px;
            font-family: 'Courier New', monospace;
            font-size: 0.6rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .chaos-btn:hover {
            border-color: #8b0000;
            color: #8b0000;
            background: #1a1a1a;
        }

        /* Cards Grid - Small */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 5px;
            margin: 15px 0;
        }

        /* Story Card - Tiny */
        .story-card {
            background: #111;
            border: 1px solid #222;
            padding: 8px;
            font-size: 0.65rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #666;
            position: relative;
            line-height: 1.2;
        }

        .story-card:hover {
            border-color: #330000;
            background: #0d0d0d;
        }

        .story-card .id {
            color: #330000;
            font-size: 0.55rem;
        }

        .story-card .title {
            color: #884444;
            margin: 2px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Modal - Small */
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            border: 2px solid #330000;
            padding: 20px;
            max-width: 300px;
            width: 90%;
            z-index: 1000;
            display: none;
            color: #888;
            font-size: 0.8rem;
            line-height: 1.4;
        }

        .modal.active {
            display: block;
            animation: glitch 0.3s;
        }

        .modal .close {
            position: absolute;
            top: 5px;
            right: 10px;
            color: #330000;
            cursor: pointer;
            font-size: 1rem;
        }

        .modal .title {
            color: #660000;
            margin-bottom: 10px;
            font-size: 1rem;
            border-bottom: 1px solid #330000;
            padding-bottom: 5px;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            border-top: 1px solid #222;
            font-size: 0.6rem;
            color: #333;
        }
    </style>
</head>
<body>
    <!-- Mini Data Bar -->
    <div class="data-mini">
        <span>IP: <span id="ip">...</span></span>
        <span>ZIP: <span id="zip">...</span></span>
    </div>

    <!-- Threat Dot -->
    <div class="threat-dot">
        <div class="threat-fill" id="threat"></div>
    </div>

    <!-- Whisper -->
    <div class="whisper" id="whisper">* find the pieces *</div>

    <!-- Progress -->
    <div class="progress" id="progress">0/20</div>

    <!-- Modal -->
    <div class="modal" id="storyModal">
        <span class="close" onclick="closeModal()">✕</span>
        <div class="title" id="modalTitle"></div>
        <div id="modalContent"></div>
    </div>

    <!-- Main -->
    <div style="max-width: 800px; margin: 0 auto;">
        <!-- Header -->
        <div style="text-align: center; margin-bottom: 10px;">
            <h1 style="color: #330000; font-size: 1.2rem; letter-spacing: 2px;">[ H O L L O W ]</h1>
            <p style="color: #222; font-size: 0.6rem;">* 20 fragments hidden *</p>
        </div>

        <!-- 10 Chaos Buttons -->
        <div class="button-grid">
            <button class="chaos-btn" onclick="activateButton(0)">🚪</button>
            <button class="chaos-btn" onclick="activateButton(1)">📼</button>
            <button class="chaos-btn" onclick="activateButton(2)">🔑</button>
            <button class="chaos-btn" onclick="activateButton(3)">📷</button>
            <button class="chaos-btn" onclick="activateButton(4)">📞</button>
            <button class="chaos-btn" onclick="activateButton(5)">📖</button>
            <button class="chaos-btn" onclick="activateButton(6)">⏰</button>
            <button class="chaos-btn" onclick="activateButton(7)">🔦</button>
            <button class="chaos-btn" onclick="activateButton(8)">🩸</button>
            <button class="chaos-btn" onclick="activateButton(9)">👁️</button>
        </div>

        <!-- Cards Grid -->
        <div class="cards-grid" id="cardsGrid"></div>

        <!-- Footer -->
        <div class="footer">
            <div id="counter">000</div>
        </div>
    </div>

    <script>
        // ==================== AUTO DATA ====================
        async function getData() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                document.getElementById('ip').textContent = ipData.ip?.slice(0,8) || '??';
                
                const geoRes = await fetch('https://ipapi.co/json/');
                const geoData = await geoRes.json();
                document.getElementById('zip').textContent = geoData.postal || '??';
            } catch(e) {}
        }
        getData();

        // ==================== 20 STORY FRAGMENTS ====================
        const storyFragments = [
            // DOOR (0-3)
            { id: 0, btn: 0, title: "door/1", content: "It appeared on the third floor. Not there yesterday. Knocking from inside. Room sealed 40 years." },
            { id: 1, btn: 0, title: "door/2", content: "The handle was warm. Like someone held it from the other side. Breathing through the wood." },
            { id: 2, btn: 0, title: "door/3", content: "Came back with crowbar. Door gone. Just wall. Janitor quit that day. Didn't say why." },
            { id: 3, btn: 0, title: "door/4", content: "Reappeared in my bedroom. I sleep in living room now. It opens at 3am." },
            
            // TAPE (4-6)
            { id: 4, btn: 1, title: "tape/1", content: "In my mailbox. 'WATCH ME' in red. Shows my house from outside. Date is tomorrow." },
            { id: 5, btn: 1, title: "tape/2", content: "Someone watching through my window. Recording me watch them. Infinite loop." },
            { id: 6, btn: 1, title: "tape/3", content: "Burned it. Reappeared in VCR. Face in static. Getting closer each play." },
            
            // KEY (7-9)
            { id: 7, btn: 2, title: "key/1", content: "Doesn't fit any lock. Found door in woods. It fit. Didn't open it." },
            { id: 8, btn: 2, title: "key/2", content: "Warm. Pulses like heartbeat. Dreamed of a room. Woke up holding something from dream." },
            { id: 9, btn: 2, title: "key/3", content: "Twelve keys now. Appeared overnight. They spell words when arranged." },
            
            // CAMERA (10-11)
            { id: 10, btn: 3, title: "camera/1", content: "Photos show things not there. Selfie had figure behind me. I was alone." },
            { id: 11, btn: 3, title: "camera/2", content: "Same figure in every photo. Getting closer. Threw camera away. It took photo of trash can. Figure there." },
            
            // PHONE (12-13)
            { id: 12, btn: 4, title: "phone/1", content: "Rings at 3am. My own voice. 'Don't sleep' it said. Calls from inside house." },
            { id: 13, btn: 4, title: "phone/2", content: "Unplugged. Still rings. From walls. 100 calls in one minute. Different voices. All say my name." },
            
            // DIARY (14-15)
            { id: 14, btn: 5, title: "diary/1", content: "In attic. My handwriting. Never wrote it. Last entry: 'today they come'." },
            { id: 15, btn: 5, title: "diary/2", content: "Wrote in it. Ink disappeared. Words appeared: 'stop writing'. Burned it. Ashes formed words." },
            
            // CLOCK (16-17)
            { id: 16, btn: 6, title: "clock/1", content: "Ticks backwards. Getting younger. Stopped at 3:33. Sun hasn't moved in 3 days." },
            { id: 17, btn: 6, title: "clock/2", content: "Chimes 13 times. Something happens on 13th. Smashed it. Pieces tick different times." },
            
            // LIGHT (18)
            { id: 18, btn: 7, title: "light/1", content: "Won't turn off. Getting brighter. Speaks. Shows shapes. They move closer." },
            
            // BLOOD (19)
            { id: 19, btn: 8, title: "blood/1", content: "In sink. On walls. Writes words. Knows my name. Cut myself. Blood wasn't mine." },
            
            // EYE (20)
            { id: 20, btn: 9, title: "eye/1", content: "In mirror. Behind me. Every reflection. Every screen. Blinked. Time stopped." }
        ];

        // State
        let found = JSON.parse(localStorage.getItem('found')) || [];
        let threat = found.length * 5;

        // ==================== RENDER ====================
        function render() {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';

            storyFragments.forEach(f => {
                if (found.includes(f.id)) return;

                const card = document.createElement('div');
                card.className = 'story-card';
                card.setAttribute('data-btn', f.btn);
                card.innerHTML = `
                    <div class="id">[${f.id}]</div>
                    <div class="title">${f.title}</div>
                    <div style="font-size:0.55rem; color:#333;">${f.content.slice(0,20)}...</div>
                `;
                card.onclick = () => openFragment(f);
                grid.appendChild(card);
            });

            document.getElementById('progress').innerHTML = `${found.length}/20`;
            document.getElementById('counter').innerHTML = found.length.toString().padStart(3, '0');
            document.getElementById('threat').style.width = (found.length * 5) + '%';
        }

        // ==================== OPEN ====================
        function openFragment(f) {
            if (!found.includes(f.id)) {
                found.push(f.id);
                localStorage.setItem('found', JSON.stringify(found));
                
                document.getElementById('modalTitle').innerHTML = f.title;
                document.getElementById('modalContent').innerHTML = f.content;
                document.getElementById('storyModal').classList.add('active');
                
                const whispers = ["closer", "watching", "behind", "run", "hide", "now", "here", "soon"];
                document.getElementById('whisper').innerHTML = `* ${whispers[Math.floor(Math.random()*whispers.length)]} *`;
                
                render();
            }
        }

        function closeModal() {
            document.getElementById('storyModal').classList.remove('active');
        }

        // ==================== CHAOS BUTTONS ====================
        function activateButton(index) {
            // Flash matching cards
            document.querySelectorAll('.story-card').forEach(c => {
                if (c.getAttribute('data-btn') == index) {
                    c.style.borderColor = '#8b0000';
                    c.style.backgroundColor = '#1a1a1a';
                    setTimeout(() => {
                        c.style.borderColor = '';
                        c.style.backgroundColor = '';
                    }, 300);
                }
            });

            // 10 different rabbit holes
            const effects = [
                // DOOR
                () => {
                    document.body.innerHTML += '<div style="position:fixed; top:50%; left:50%; color:#330000; font-size:5rem; transform:translate(-50%,-50%); z-index:1000;">🚪</div>';
                    setTimeout(() => location.reload(), 2000);
                },
                
                // TAPE
                () => {
                    let count = 0;
                    const interval = setInterval(() => {
                        document.body.style.filter = `invert(${count % 2})`;
                        count++;
                        if (count > 10) {
                            clearInterval(interval);
                            document.body.style.filter = '';
                        }
                    }, 100);
                },
                
                // KEY
                () => {
                    const keys = ['🔑', '🗝️', '⚿', '🔐', '🔏'];
                    for (let i = 0; i < 20; i++) {
                        setTimeout(() => {
                            const k = document.createElement('div');
                            k.style.position = 'fixed';
                            k.style.left = Math.random() * 100 + '%';
                            k.style.top = Math.random() * 100 + '%';
                            k.style.fontSize = '2rem';
                            k.style.zIndex = '1000';
                            k.innerHTML = keys[Math.floor(Math.random()*keys.length)];
                            document.body.appendChild(k);
                            setTimeout(() => k.remove(), 1000);
                        }, i * 50);
                    }
                },
                
                // CAMERA
                () => {
                    document.querySelectorAll('.story-card').forEach(c => {
                        c.style.transform = 'rotate(' + (Math.random() * 10 - 5) + 'deg)';
                    });
                    setTimeout(() => {
                        document.querySelectorAll('.story-card').forEach(c => {
                            c.style.transform = '';
                        });
                    }, 2000);
                },
                
                // PHONE
                () => {
                    const nums = [];
                    for (let i = 0; i < 10; i++) {
                        nums.push(Math.floor(Math.random() * 10));
                    }
                    alert('📞 CALL FROM: ' + nums.join(''));
                },
                
                // DIARY
                () => {
                    document.getElementById('whisper').innerHTML = '* writing itself *';
                    const colors = ['#330000', '#660000', '#8b0000', '#ff0000'];
                    document.querySelectorAll('.story-card').forEach(c => {
                        c.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
                    });
                },
                
                // CLOCK
                () => {
                    let time = 10;
                    const timer = setInterval(() => {
                        document.getElementById('progress').innerHTML = `TIME: ${time--}`;
                        if (time < 0) {
                            clearInterval(timer);
                            render();
                        }
                    }, 100);
                },
                
                // LIGHT
                () => {
                    document.body.style.backgroundColor = '#fff';
                    document.body.style.color = '#000';
                    setTimeout(() => {
                        document.body.style.backgroundColor = '';
                        document.body.style.color = '';
                    }, 500);
                },
                
                // BLOOD
                () => {
                    for (let i = 0; i < 30; i++) {
                        setTimeout(() => {
                            const drop = document.createElement('div');
                            drop.style.position = 'fixed';
                            drop.style.left = Math.random() * 100 + '%';
                            drop.style.top = '0';
                            drop.style.width = '2px';
                            drop.style.height = Math.random() * 30 + 10 + 'px';
                            drop.style.background = '#8b0000';
                            drop.style.zIndex = '9999';
                            document.body.appendChild(drop);
                            setTimeout(() => drop.remove(), 2000);
                        }, i * 50);
                    }
                },
                
                // EYE
                () => {
                    const eye = document.createElement('div');
                    eye.style.position = 'fixed';
                    eye.style.top = '50%';
                    eye.style.left = '50%';
                    eye.style.transform = 'translate(-50%,-50%)';
                    eye.style.fontSize = '10rem';
                    eye.style.zIndex = '10000';
                    eye.style.opacity = '0.5';
                    eye.innerHTML = '👁️';
                    document.body.appendChild(eye);
                    setTimeout(() => eye.remove(), 2000);
                }
            ];

            effects[index]();
        }

        // Initial render
        render();

        // Random whispers
        setInterval(() => {
            const msgs = ["listen", "look", "feel", "know", "fear", "run", "hide", "seek"];
            document.getElementById('whisper').innerHTML = `* ${msgs[Math.floor(Math.random()*msgs.length)]} *`;
        }, 5000);

        // Mouse cursor
        document.addEventListener('mousemove', (e) => {
            const cursor = document.createElement('div');
            cursor.style.position = 'fixed';
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            cursor.style.width = '5px';
            cursor.style.height = '5px';
            cursor.style.background = '#330000';
            cursor.style.borderRadius = '50%';
            cursor.style.pointerEvents = 'none';
            cursor.style.zIndex = '9999';
            document.body.appendChild(cursor);
            setTimeout(() => cursor.remove(), 500);
        });
    </script>
</body>
</html>
